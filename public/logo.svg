<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <!-- A 5x5 nonogram grid with a solved diamond pattern: faint outlines mark
       every cell, solid white squares mark the "filled" ones. -->
  <g stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" fill="none">
    <rect x="84" y="84" width="56" height="56" rx="8" />
    <rect x="156" y="84" width="56" height="56" rx="8" />
    <rect x="228" y="84" width="56" height="56" rx="8" />
    <rect x="300" y="84" width="56" height="56" rx="8" />
    <rect x="372" y="84" width="56" height="56" rx="8" />

    <rect x="84" y="156" width="56" height="56" rx="8" />
    <rect x="372" y="156" width="56" height="56" rx="8" />

    <rect x="84" y="372" width="56" height="56" rx="8" />
    <rect x="372" y="372" width="56" height="56" rx="8" />

    <rect x="84" y="300" width="56" height="56" rx="8" />
    <rect x="372" y="300" width="56" height="56" rx="8" />

    <rect x="156" y="372" width="56" height="56" rx="8" />
    <rect x="228" y="372" width="56" height="56" rx="8" />
    <rect x="300" y="372" width="56" height="56" rx="8" />
  </g>
  <g fill="#ffffff">
    <rect x="228" y="84" width="56" height="56" rx="8" />
    <rect x="156" y="156" width="56" height="56" rx="8" />
    <rect x="228" y="156" width="56" height="56" rx="8" />
    <rect x="300" y="156" width="56" height="56" rx="8" />
    <rect x="84" y="228" width="56" height="56" rx="8" />
    <rect x="156" y="228" width="56" height="56" rx="8" />
    <rect x="228" y="228" width="56" height="56" rx="8" />
    <rect x="300" y="228" width="56" height="56" rx="8" />
    <rect x="372" y="228" width="56" height="56" rx="8" />
    <rect x="156" y="300" width="56" height="56" rx="8" />
    <rect x="228" y="300" width="56" height="56" rx="8" />
    <rect x="300" y="300" width="56" height="56" rx="8" />
    <rect x="228" y="372" width="56" height="56" rx="8" />
  </g>
</svg>
